<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GaleyGrid OR Display</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060a09;--sf:#0e1512;--sf2:#151d19;--bd:#1e2b25;--bdl:#2d3f36;
  --tx:#e4ece6;--txm:#8a9e90;--txd:#546058;
  --ac:#3edba0;--acd:#268a62;--acb:rgba(62,219,160,.07);
  --cup:#a78bfa;--cupb:rgba(167,139,250,.07);
  --dn:#e85454;--wn:#e8c844;--wnb:rgba(232,200,68,.07);
  --f:'DM Sans',-apple-system,sans-serif;--m:'JetBrains Mono','SF Mono',monospace
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--f);-webkit-font-smoothing:antialiased;overflow:hidden}

/* ---- Layout ---- */
#root{display:flex;flex-direction:column;height:100vh;width:100vw;}
#hdr{padding:10px 20px;border-bottom:1px solid var(--bd);background:var(--sf);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
#body{flex:1;display:flex;overflow:hidden;min-height:0}
#imgPane{flex:1.4;position:relative;background:#000;overflow:hidden;display:flex;align-items:center;justify-content:center}
#dataPane{width:340px;flex-shrink:0;background:var(--sf);border-left:1px solid var(--bd);overflow-y:auto;display:flex;flex-direction:column}

/* ---- Header ---- */
.logo{display:flex;align-items:center;gap:10px}
.logo-i{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--ac),var(--acd));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:var(--bg)}
.logo-t{font-size:16px;font-weight:800;letter-spacing:-.02em}
.logo-s{font-size:8px;color:var(--txd);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
#modeTag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:4px 10px;border-radius:12px;border:1px solid;transition:.3s}
#modeTag.ap{color:var(--ac);background:var(--acb);border-color:rgba(62,219,160,.2)}
#modeTag.cup{color:var(--cup);background:var(--cupb);border-color:rgba(167,139,250,.2)}
#caseLabel{font-size:11px;color:var(--txm);font-family:var(--m)}
#statusDot{width:8px;height:8px;border-radius:50%;background:var(--txd);flex-shrink:0;transition:.3s}
#statusDot.live{background:var(--ac);box-shadow:0 0 8px var(--ac)}
#statusDot.cup-live{background:var(--cup);box-shadow:0 0 8px var(--cup)}
#lastUpdate{font-size:9px;color:var(--txd);font-family:var(--m)}

/* ---- Image pane ---- */
#imgEl{max-width:100%;max-height:100%;object-fit:contain;transition:opacity .3s;display:block}
#imgEl.loading{opacity:0}
#noImg{position:absolute;display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--txd);text-align:center}
#noImg .ni-icon{font-size:48px;opacity:.3}
#noImg .ni-txt{font-size:14px;font-weight:600;opacity:.5}
#noImg .ni-sub{font-size:11px;opacity:.3;max-width:200px;line-height:1.5}
#imgOverlay{position:absolute;bottom:16px;right:16px;font-size:10px;color:rgba(255,255,255,.35);font-family:var(--m);pointer-events:none}

/* ---- Data pane ---- */
.dp-section{padding:16px 18px;border-bottom:1px solid var(--bd)}
.dp-section:last-child{border-bottom:none}
.dp-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--txd);margin-bottom:10px}

/* Delta card */
.delta-card{background:var(--sf2);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.delta-card.ok{border-color:rgba(62,219,160,.25)}
.delta-card.warn{border-color:rgba(232,200,68,.25)}
.delta-name{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--txm);margin-bottom:6px}
.delta-val{font-size:42px;font-weight:800;font-family:var(--m);line-height:1;letter-spacing:-.02em}
.delta-val.ok{color:var(--ac)}
.delta-val.warn{color:var(--wn)}
.delta-val.cup-ok{color:var(--cup)}
.delta-val.neutral{color:var(--tx)}
.delta-sub{font-size:10px;color:var(--txm);margin-top:4px}

/* Metrics row */
.metric-row{display:flex;gap:10px;margin-bottom:10px}
.metric-cell{flex:1;background:var(--sf2);border:1px solid var(--bd);border-radius:10px;padding:10px 12px}
.metric-cell.ok{border-color:rgba(62,219,160,.2)}
.metric-cell.warn{border-color:rgba(232,200,68,.2)}
.metric-cell.cup-ok{border-color:rgba(167,139,250,.2)}
.metric-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--txd);margin-bottom:4px}
.metric-val{font-size:22px;font-weight:800;font-family:var(--m);line-height:1}
.metric-val.ok{color:var(--ac)}
.metric-val.warn{color:var(--wn)}
.metric-val.cup-ok{color:var(--cup)}
.metric-val.neutral{color:var(--tx)}
.metric-range{font-size:9px;color:var(--txd);margin-top:3px}

/* Reference row */
.ref-row{display:flex;gap:8px;flex-wrap:wrap}
.ref-chip{font-size:10px;font-family:var(--m);color:var(--txm);background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:4px 8px}
.ref-chip span{color:var(--tx);font-weight:700}

/* Target guides */
.target-bar{height:4px;background:var(--bd);border-radius:2px;margin-top:8px;position:relative;overflow:visible}
.target-zone{position:absolute;top:0;height:100%;border-radius:2px;background:rgba(62,219,160,.25);border:1px solid rgba(62,219,160,.4)}
.target-zone.cup{background:rgba(167,139,250,.25);border:1px solid rgba(167,139,250,.4)}
.target-marker{position:absolute;top:-4px;width:3px;height:12px;border-radius:2px;transform:translateX(-50%)}
.target-marker.ok{background:var(--ac)}
.target-marker.cup-ok{background:var(--cup)}
.target-marker.warn{background:var(--wn)}

/* Footer */
#footer{padding:8px 16px;border-top:1px solid var(--bd);background:var(--sf);display:flex;align-items:center;gap:12px;flex-shrink:0}
#pollStatus{font-size:9px;color:var(--txd);font-family:var(--m);flex:1}
.cfg-row{display:flex;gap:6px;align-items:center}
.cfg-lbl{font-size:9px;font-weight:600;color:var(--txd);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.cfg-input{background:var(--bg);border:1px solid var(--bd);border-radius:5px;padding:4px 8px;color:var(--tx);font-size:10px;font-family:var(--m);outline:none;width:220px}

/* Animations */
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
.pulse{animation:pulse 1.5s ease-in-out infinite}
@keyframes flashIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.flash-in{animation:flashIn .35s ease-out}
</style>
</head>
<body>
<div id="root">
  <!-- Header -->
  <div id="hdr">
    <div class="logo">
      <div class="logo-i">G</div>
      <div>
        <div class="logo-t">GaleyGrid</div>
        <div class="logo-s">OR Live Display</div>
      </div>
    </div>
    <div id="modeTag" class="ap">AP / LLD</div>
    <div id="caseLabel">—</div>
    <div style="display:flex;align-items:center;gap:8px;margin-left:auto">
      <div id="statusDot"></div>
      <div id="lastUpdate">Waiting...</div>
    </div>
  </div>

  <!-- Body -->
  <div id="body">
    <!-- Image pane -->
    <div id="imgPane">
      <div id="noImg">
        <div class="ni-icon">📡</div>
        <div class="ni-txt">Awaiting First Shot</div>
        <div class="ni-sub">Press "Send to Screen" on the iPad to display a shot here.</div>
      </div>
      <img id="imgEl" src="" alt="" style="display:none">
      <div id="imgOverlay"></div>
    </div>

    <!-- Data pane -->
    <div id="dataPane">
      <div class="dp-section">
        <div class="dp-label" id="dpModeLabel">LLD &amp; Offset</div>
        <div id="dpMain"><div style="color:var(--txd);font-size:12px;text-align:center;padding:20px 0">Waiting for data...</div></div>
      </div>
      <div class="dp-section" id="dpRefSection" style="display:none">
        <div class="dp-label">Reference Shot</div>
        <div class="ref-row" id="dpRef"></div>
      </div>
      <div class="dp-section">
        <div class="dp-label">Configuration</div>
        <div class="cfg-row">
          <div class="cfg-lbl">Supabase URL</div>
          <input class="cfg-input" id="sbUrl" placeholder="https://xxx.supabase.co">
        </div>
        <div class="cfg-row" style="margin-top:6px">
          <div class="cfg-lbl">Anon Key</div>
          <input class="cfg-input" id="sbKey" placeholder="eyJ..." type="password">
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div id="footer">
    <div id="pollStatus" class="pulse">Initializing...</div>
    <div style="font-size:9px;color:var(--txd)">Auto-refreshes every 5 s</div>
  </div>
</div>

<script>
// ============================================================
// Config — auto-fill from URL params (e.g. ?sbUrl=...&sbKey=...)
// ============================================================
const params=new URLSearchParams(location.search);
if(params.get('sbUrl'))document.getElementById('sbUrl').value=params.get('sbUrl');
if(params.get('sbKey'))document.getElementById('sbKey').value=params.get('sbKey');

// Persist config in localStorage
['sbUrl','sbKey'].forEach(id=>{
  const el=document.getElementById(id);
  const stored=localStorage.getItem('gg_display_'+id);
  if(stored&&!el.value)el.value=stored;
  el.addEventListener('input',()=>localStorage.setItem('gg_display_'+id,el.value));
});

// ============================================================
// State
// ============================================================
let lastApTime=null,lastCupTime=null,currentMode='none';
let lastImgUrl=null,lastPollTs=null;

// ============================================================
// Poll both tables, show whichever is newer
// ============================================================
async function poll(){
  const sbUrl=document.getElementById('sbUrl').value.trim();
  const sbKey=document.getElementById('sbKey').value.trim();
  if(!sbUrl||!sbKey){
    setPollStatus('⚠ Enter Supabase URL and Key in config below','');
    return;
  }

  try{
    const headers={'apikey':sbKey,'Authorization':`Bearer ${sbKey}`,'Content-Type':'application/json'};

    // Fetch latest AP row
    const apResp=await fetch(`${sbUrl}/rest/v1/live_display?order=updated_at.desc&limit=1`,{headers});
    const cupResp=await fetch(`${sbUrl}/rest/v1/cup_live_display?order=updated_at.desc&limit=1`,{headers});

    let apRow=null,cupRow=null;
    if(apResp.ok){const d=await apResp.json();apRow=d[0]||null;}
    if(cupResp.ok){const d=await cupResp.json();cupRow=d[0]||null;}

    lastPollTs=new Date();

    // Compare timestamps → pick newest
    const apT=apRow?new Date(apRow.updated_at):null;
    const cupT=cupRow?new Date(cupRow.updated_at):null;

    if(!apRow&&!cupRow){
      setPollStatus('No data yet — send a shot from the iPad','');
      setStatusDot('idle');
      return;
    }

    if(cupT&&(!apT||cupT>=apT)){
      renderCupMode(cupRow);
    } else {
      renderApMode(apRow);
    }

    setStatusDot(currentMode==='cup'?'cup-live':'live');
    const ago=Math.round((Date.now()-lastPollTs)/1000);
    setPollStatus(`Last update: ${lastPollTs.toLocaleTimeString()} · polling every 5 s`,'');

  }catch(err){
    setPollStatus(`Poll error: ${err.message}`,'warn');
    setStatusDot('idle');
  }
}

// ============================================================
// Render AP / LLD mode
// ============================================================
function renderApMode(row){
  currentMode='ap';
  document.getElementById('modeTag').className='ap';
  document.getElementById('modeTag').textContent='AP / LLD';
  document.getElementById('dpModeLabel').textContent='LLD & Offset';

  const caseId=row.case_id||'—';
  document.getElementById('caseLabel').textContent=`Case ${caseId} · Shot ${row.shot_number??''}`;

  // Image
  maybeUpdateImage(row.image_url,`Shot ${row.shot_number??''} · ${new Date(row.updated_at).toLocaleTimeString()}`);

  // Main metrics
  const lldDelta=row.lld_delta_mm;
  const offDelta=row.offset_delta_mm;
  const hasScale=row.has_scale;

  let html='';

  // LLD delta — primary
  if(lldDelta!=null){
    const abs=Math.abs(lldDelta);
    const ok=abs<=3;
    const sign=lldDelta>0?'+':'';
    html+=`<div class="delta-card ${ok?'ok':'warn'}">
      <div class="delta-name">LLD Delta (teardrop ref)</div>
      <div class="delta-val ${ok?'ok':'warn'}">${sign}${lldDelta.toFixed(1)}<span style="font-size:20px;font-weight:600"> mm</span></div>
      <div class="delta-sub">${ok?'Within 3 mm threshold':'⚠ Exceeds 3 mm threshold'}</div>
      ${makeTargetBar(lldDelta,-8,8,[-3,3],ok?'ok':'warn')}
    </div>`;
  }

  // Offset delta
  if(offDelta!=null){
    const abs=Math.abs(offDelta);
    const ok=abs<=5;
    const sign=offDelta>0?'+':'';
    html+=`<div class="delta-card ${ok?'ok':'warn'}" style="margin-bottom:0">
      <div class="delta-name">Femoral Offset Delta (op side)</div>
      <div class="delta-val ${ok?'ok':'warn'}" style="font-size:32px">${sign}${offDelta.toFixed(1)}<span style="font-size:16px;font-weight:600"> mm</span></div>
      <div class="delta-sub">${ok?'Within range':'⚠ Check offset'}</div>
    </div>`;
  }

  if(!lldDelta&&!offDelta){
    // Absolute values
    const metrics=[];
    if(row.lld_td_mm!=null)metrics.push({lbl:'LLD (TD)',val:row.lld_td_mm.toFixed(1)+' mm',ok:null});
    if(row.lld_it_mm!=null)metrics.push({lbl:'LLD (IT)',val:row.lld_it_mm.toFixed(1)+' mm',ok:null});
    if(row.offset_l_mm!=null)metrics.push({lbl:'L Offset',val:row.offset_l_mm.toFixed(1)+' mm',ok:null});
    if(row.offset_r_mm!=null)metrics.push({lbl:'R Offset',val:row.offset_r_mm.toFixed(1)+' mm',ok:null});
    if(metrics.length){
      html+='<div class="metric-row">';
      metrics.forEach(m=>{html+=`<div class="metric-cell neutral"><div class="metric-lbl">${m.lbl}</div><div class="metric-val neutral">${m.val}</div></div>`;});
      html+='</div>';
    } else {
      html+='<div style="color:var(--txd);font-size:11px;text-align:center;padding:16px 0">Analyzing...</div>';
    }
  }

  // Tilt
  if(row.tilt_deg!=null){
    const ok=Math.abs(row.tilt_deg)<3;
    html+=`<div class="metric-row" style="margin-top:8px;margin-bottom:0">
      <div class="metric-cell ${ok?'ok':'warn'}">
        <div class="metric-lbl">Pelvic Tilt</div>
        <div class="metric-val ${ok?'ok':'warn'}">${row.tilt_deg>0?'+':''}${row.tilt_deg.toFixed(1)}°</div>
        <div class="metric-range">${ok?'Acceptable':'Review tilt'}</div>
      </div>
      <div class="metric-cell">
        <div class="metric-lbl">Op Side</div>
        <div class="metric-val neutral" style="font-size:18px;text-transform:capitalize">${row.op_side||'—'}</div>
        <div class="metric-range">Operative</div>
      </div>
      ${!hasScale?`<div class="metric-cell warn"><div class="metric-lbl">Scale</div><div class="metric-val warn" style="font-size:14px">⚠ Not set</div><div class="metric-range">Values in px</div></div>`:''}
    </div>`;
  }

  document.getElementById('dpMain').innerHTML=html;
  document.getElementById('dpMain').classList.add('flash-in');
  setTimeout(()=>document.getElementById('dpMain').classList.remove('flash-in'),400);

  // Reference values
  if(row.ref_lld_td_mm!=null||row.ref_offset_l_mm!=null){
    document.getElementById('dpRefSection').style.display='';
    let rh='';
    if(row.ref_lld_td_mm!=null)rh+=`<div class="ref-chip">LLD-TD <span>${row.ref_lld_td_mm.toFixed(1)} mm</span></div>`;
    if(row.ref_offset_l_mm!=null)rh+=`<div class="ref-chip">L Off <span>${row.ref_offset_l_mm.toFixed(1)} mm</span></div>`;
    if(row.ref_offset_r_mm!=null)rh+=`<div class="ref-chip">R Off <span>${row.ref_offset_r_mm.toFixed(1)} mm</span></div>`;
    if(row.ref_tilt_deg!=null)rh+=`<div class="ref-chip">Tilt <span>${row.ref_tilt_deg.toFixed(1)}°</span></div>`;
    document.getElementById('dpRef').innerHTML=rh;
  } else {
    document.getElementById('dpRefSection').style.display='none';
  }
}

// ============================================================
// Render Cup Positioning mode
// ============================================================
function renderCupMode(row){
  currentMode='cup';
  document.getElementById('modeTag').className='cup';
  document.getElementById('modeTag').textContent=`Cup · ${(row.shot_type||'').toUpperCase()}`;
  document.getElementById('dpModeLabel').textContent='Cup Positioning';

  const caseId=row.case_id||'—';
  document.getElementById('caseLabel').textContent=`Case ${caseId} · ${row.shot_type==='final'?'Final':'Trial'}`;

  // Image
  maybeUpdateImage(row.image_url,`${row.shot_type==='final'?'Final':'Trial'} Cup · ${new Date(row.updated_at).toLocaleTimeString()}`);

  const inc=row.inclination_deg;
  const ant=row.anteversion_deg;
  const incOk=inc>=30&&inc<=50;
  const antOk=ant>=10&&ant<=30;
  const allOk=incOk&&antOk;

  let html='';

  // Inclination big card
  html+=`<div class="delta-card ${incOk?'ok':'warn'}">
    <div class="delta-name">Inclination</div>
    <div class="delta-val ${incOk?'cup-ok':'warn'}">${inc!=null?inc.toFixed(1):'—'}<span style="font-size:22px;font-weight:600">°</span></div>
    <div class="delta-sub">Target 30–50°${incOk?'':' ⚠ OUT OF RANGE'}</div>
    ${inc!=null?makeTargetBar(inc,0,80,[30,50],incOk?'cup-ok':'warn',true):''}
  </div>`;

  // Anteversion big card
  html+=`<div class="delta-card ${antOk?'ok':'warn'}" style="margin-bottom:0">
    <div class="delta-name">Anteversion</div>
    <div class="delta-val ${antOk?'cup-ok':'warn'}">${ant!=null?ant.toFixed(1):'—'}<span style="font-size:22px;font-weight:600">°</span></div>
    <div class="delta-sub">Target 10–30°${antOk?'':' ⚠ OUT OF RANGE'}</div>
    ${ant!=null?makeTargetBar(ant,0,60,[10,30],antOk?'cup-ok':'warn',true):''}
  </div>`;

  // Supplemental
  const pts=row.rim_point_count;
  const axR=row.axis_ratio;
  if(pts||axR){
    html+=`<div class="metric-row" style="margin-top:10px;margin-bottom:0">
      ${pts?`<div class="metric-cell"><div class="metric-lbl">Rim Points</div><div class="metric-val neutral">${pts}</div><div class="metric-range">Ellipse confidence</div></div>`:''}
      ${axR?`<div class="metric-cell"><div class="metric-lbl">Axis Ratio</div><div class="metric-val neutral">${(axR*100).toFixed(0)}%</div><div class="metric-range">minor/major</div></div>`:''}
      ${row.implant_cup_mm?`<div class="metric-cell"><div class="metric-lbl">Cup Size</div><div class="metric-val neutral">${row.implant_cup_mm}</div><div class="metric-range">mm</div></div>`:''}
    </div>`;
  }

  // Overall status
  html+=`<div style="margin-top:10px;padding:8px 12px;border-radius:8px;text-align:center;background:${allOk?'rgba(167,139,250,.12)':'rgba(232,200,68,.1)'};border:1px solid ${allOk?'rgba(167,139,250,.3)':'rgba(232,200,68,.3)'};font-size:11px;font-weight:700;color:${allOk?'#a78bfa':'#e8c844'}">${allOk?'✓ Both angles in target zone':'⚠ Adjust cup position'}</div>`;

  document.getElementById('dpMain').innerHTML=html;
  document.getElementById('dpMain').classList.add('flash-in');
  setTimeout(()=>document.getElementById('dpMain').classList.remove('flash-in'),400);

  document.getElementById('dpRefSection').style.display='none';
}

// ============================================================
// Image update — only swap src when URL actually changes (cache-bust)
// ============================================================
function maybeUpdateImage(url,caption){
  const imgEl=document.getElementById('imgEl');
  const noImg=document.getElementById('noImg');
  const overlay=document.getElementById('imgOverlay');
  if(!url){noImg.style.display='flex';imgEl.style.display='none';return;}
  noImg.style.display='none';
  imgEl.style.display='block';
  // Only reload if URL has changed
  if(url!==lastImgUrl){
    lastImgUrl=url;
    imgEl.classList.add('loading');
    // Cache-bust by appending timestamp
    const busted=url+(url.includes('?')?'&':'?')+'t='+Date.now();
    imgEl.onload=()=>{imgEl.classList.remove('loading');};
    imgEl.onerror=()=>{imgEl.classList.remove('loading');};
    imgEl.src=busted;
  }
  overlay.textContent=caption||'';
}

// ============================================================
// Target bar helper
// ============================================================
function makeTargetBar(val,min,max,zone,cls,isCup=false){
  const range=max-min;
  const zoneStartPct=((zone[0]-min)/range*100).toFixed(1);
  const zoneWidthPct=((zone[1]-zone[0])/range*100).toFixed(1);
  const markerPct=(Math.min(max,Math.max(min,val))-min)/range*100;
  return`<div class="target-bar">
    <div class="target-zone${isCup?' cup':''}" style="left:${zoneStartPct}%;width:${zoneWidthPct}%"></div>
    <div class="target-marker ${cls}" style="left:${markerPct.toFixed(1)}%"></div>
  </div>`;
}

// ============================================================
// Status helpers
// ============================================================
function setStatusDot(state){
  const d=document.getElementById('statusDot');
  d.className=state==='live'?'live':state==='cup-live'?'cup-live':'';
}
function setPollStatus(msg,cls){
  const el=document.getElementById('pollStatus');
  el.textContent=msg;
  el.className=cls?'pulse':'';
}

// ============================================================
// Start polling
// ============================================================
poll();
setInterval(poll,5000);
</script>
</body>
</html>
